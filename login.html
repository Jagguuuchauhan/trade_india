<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trade Terminal Access</title>
  <link rel="stylesheet" href="login.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">

  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
</head>
<body>

<!-- Background Video -->
  <video autoplay muted loop id="video-background">
    <source src="aaa.mp4" type="video/mp4" />
    Your browser does not support the video tag.
  </video>


  <div class="main-wrapper">
    <div class="container" id="container">
      
      <div id="loginForm" class="form-panel active">
        <h1>Welcome to trade india</h1>
        <p class="subtitle">START YOUR TRADING JOURNEY.</p>

       <input type="email" id="loginEmail" placeholder="Email Address" required>
        <input type="password" id="loginPassword" placeholder="Password" required>

        <button onclick="loginUser()">Login to Terminal</button>
        
        <div class="separator"><span>OR</span></div>
        
        <div class="social-container">
          <a href="#" class="social google-btn" onclick="socialLogin('google')" title="Login with Google"><i class="fab fa-google"></i></a>
          <a href="#" class="social facebook-btn" onclick="socialLogin('facebook')" title="Login with Facebook"><i class="fab fa-facebook-f"></i></a>
          <a href="#" class="social github-btn" onclick="socialLogin('github')" title="Login with GitHub"><i class="fab fa-github"></i></a>
        </div>
        
        <p class="toggle" onclick="showRegister()">New Trader? **Register Account**</p>
      </div>

      <div id="registerForm" class="form-panel" style="display:none;">
        <h1>Create Account</h1>
        <p class="subtitle">Join our platform in just a minute.</p>

        <input type="text" id="regName" placeholder="Full Name" required>
        <input type="email" id="regEmail" placeholder="Email Address" required>
        <input type="password" id="regPassword" placeholder="New Password" required>
        <input type="password" id="regConfirmPassword" placeholder="Confirm Password" required>

        <button onclick="registerUser()">Register Account</button>
        
        <div class="separator"><span>OR</span></div>
        
        <div class="social-container">
          <a href="#" class="social google-btn" onclick="socialLogin('google')"><i class="fab fa-google"></i></a>
          <a href="#" class="social facebook-btn" onclick="socialLogin('facebook')"><i class="fab fa-facebook-f"></i></a>
          <a href="#" class="social github-btn" onclick="socialLogin('github')"><i class="fab fa-github"></i></a>
        </div>

        <p class="toggle" onclick="showLogin()">Already Registered? **Login Now**</p>
      </div>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
